name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

jobs:
  claude-review:
    # Optional: Filter by PR author
    # if: |
    #   github.event.pull_request.user.login == 'external-contributor' ||
    #   github.event.pull_request.user.login == 'new-developer' ||
    #   github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR'

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this pull request thoroughly. Read CLAUDE.md for project rules and conventions.

            Check for:
            - Bugs, logic errors, race conditions
            - Security issues (exposed secrets, missing auth, injection)
            - Performance problems (N+1 queries, missing pagination, unnecessary re-renders)
            - Missing error handling, missing cache revalidation
            - Violations of project conventions in CLAUDE.md
            - Test coverage gaps

            After reviewing, submit a formal PR review using `gh pr review`:

            If you find CRITICAL or WARNING issues:
              gh pr review $PR_NUMBER --request-changes --body "your review"

            If the code passes all checks:
              gh pr review $PR_NUMBER --approve --body "your review"

            Format your review body as structured markdown with sections:
            ## PR Review: `<title>`
            ### Critical (if any)
            ### Warnings (if any)
            ### Verdict: SHIP IT or NEEDS WORK

          claude_args: '--allowed-tools "Bash(gh issue view:*),Bash(gh search:*),Bash(gh issue list:*),Bash(gh pr review:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr list:*)"'

